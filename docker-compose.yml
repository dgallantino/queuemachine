services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${QUEUE_MACHINE_DB_NAME:-queuemachine}
      MYSQL_USER: ${QUEUE_MACHINE_DB_USER:-queuemachine}
      MYSQL_PASSWORD: ${QUEUE_MACHINE_DB_PASSWORD:-changeme}
      MYSQL_ROOT_PASSWORD: ${QUEUE_MACHINE_DB_ROOT_PASSWORD:-rootchangeme}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${QUEUE_MACHINE_DB_ROOT_PASSWORD:-rootchangeme}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s

  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      QUEUE_MACHINE_DB_HOST: db
      QUEUE_MACHINE_DB_PORT: "3306"
    volumes:
      - staticfiles:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${QUEUE_MACHINE_HTTP_PORT:-8080}:80"
    volumes:
      - staticfiles:/var/www/static:ro
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

volumes:
  db_data:
  staticfiles:
